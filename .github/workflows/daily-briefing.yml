name: 每日简报推送

on:
  schedule:
    # 北京时间早上8点 = UTC 0点，每天一次
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  briefing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Generate briefing and push to WeChat
        run: python daily_briefing.py
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          MIMO_API_KEY: ${{ secrets.MIMO_API_KEY }}
          MIMO_BASE_URL: "https://api.xiaomimimo.com/v1"
          MIMO_MODEL: "mimo-v2.5"

      - name: Commit briefing
        run: |
          git config user.name "caixin-monitor-bot"
          git config user.email "caixin-monitor-bot[bot]@users.noreply.github.com"
          git add articles/daily/
          if git diff --cached --quiet; then
            echo "无简报更新"
          else
            git commit -m "docs: 每日简报 $(date -u +%Y-%m-%d)"
            git push
          fi
