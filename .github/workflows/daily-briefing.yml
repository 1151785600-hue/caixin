name: 每日简报

on:
  schedule:
    # UTC 16:30 = 北京时间 0:30: 生成前一天简报后立即推送
    - cron: '30 16 * * *'
  workflow_dispatch:
    inputs:
      phase:
        description: '运行阶段: all / generate / push'
        required: false
        default: 'all'
      target_date:
        description: '处理日期 YYYY-MM-DD'
        required: false

permissions:
  contents: write

jobs:
  generate:
    if: github.event.inputs.phase != 'push'
    runs-on: ubuntu-latest
    outputs:
      has_articles: ${{ steps.check.outputs.has_articles }}
      briefing_date: ${{ steps.set_date.outputs.briefing_date }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Set target date
        id: set_date
        run: |
          if [ -n "$TARGET_DATE" ]; then
            echo "briefing_date=$TARGET_DATE" >> $GITHUB_OUTPUT
          else
            echo "briefing_date=$(TZ='Asia/Shanghai' date +%Y-%m-%d)" >> $GITHUB_OUTPUT
          fi
      - name: Generate briefing
        run: python generate_briefing.py
        env:
          MIMO_API_KEY: ${{ secrets.MIMO_API_KEY }}
          MIMO_BASE_URL: "https://api.xiaomimimo.com/v1"
          MIMO_MODEL: "mimo-v2.5"
          TARGET_DATE: ${{ steps.set_date.outputs.briefing_date }}

      - name: Generate OPML feed
        run: python generate_opml.py

      - name: Generate RSS feed
        run: python generate_rss.py
      - name: Commit
        run: |
          git config user.name "bot"
          git config user.email "bot@users.noreply.github.com"
          git add articles/ feed.opml feed.xml
          git diff --cached --quiet || (git commit -m "briefing $(date -u +%Y-%m-%d)" && git pull --rebase origin main && git push)
      - name: Check articles
        id: check
        run: |
          BDATE=${{ steps.set_date.outputs.briefing_date }}
          if [ -f "articles/daily/${BDATE}_briefing.json" ]; then
            COUNT=$(python3 -c "import json; d=json.load(open('articles/daily/${BDATE}_briefing.json')); print(len(d.get('articles',[])))")
            echo "has_articles=true" >> $GITHUB_OUTPUT
            echo "Found ${COUNT} articles for ${BDATE}"
          else
            echo "has_articles=false" >> $GITHUB_OUTPUT
            echo "No briefing for ${BDATE}"
          fi

  push:
    needs: generate
    if: |
      needs.generate.outputs.has_articles == 'true' || 
      github.event.inputs.phase == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Push to WeChat
        run: python push_briefing.py
        env:
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRIEFING_DATE: ${{ needs.generate.outputs.briefing_date }}
