name: SCMP深度报道抓取

on:
  schedule:
    # UTC时间，每3小时错开1小时，北京时间对应为9/12/15/18/21/0点
    # 北京0:00（次日）那轮在生成简报之前跑，23点那轮是当天最后一批
    - cron: '0 1 * * *'   # 北京9:00
    - cron: '0 4 * * *'   # 北京12:00
    - cron: '0 7 * * *'   # 北京15:00
    - cron: '0 10 * * *'  # 北京18:00
    - cron: '0 13 * * *'  # 北京21:00
    - cron: '0 16 * * *'  # 北京0:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run SCMP scraper
        run: python scmp_monitor.py
        env:
          OUTPUT_DIR: articles/scmp

      - name: Commit and push
        run: |
          git config user.name "caixin-monitor-bot"
          git config user.email "caixin-monitor-bot[bot]@users.noreply.github.com"
          git add articles/scmp/
          if git diff --cached --quiet; then
            echo "没有新文章"
          else
            git diff --cached --name-only
            git commit -m "docs: SCMP新文章 $(date -u +%Y-%m-%d_%H:%M_UTC)"
            git pull --rebase origin main
            git push
          fi
