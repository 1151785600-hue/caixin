name: 每日简报

on:
  schedule:
    - cron: '30 16 * * *'
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      phase:
        description: '运行阶段: generate 或 push'
        required: false
        default: 'generate'
      target_date:
        description: '处理日期 YYYY-MM-DD (仅generate, 默认前一天)'
        required: false

permissions:
  contents: write

jobs:
  generate:
    if: |
      github.event.schedule == '30 16 * * *' || 
      (github.event_name == 'workflow_dispatch' && github.event.inputs.phase == 'generate') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.phase == '')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Generate briefing
        run: python generate_briefing.py
        env:
          MIMO_API_KEY: ${{ secrets.MIMO_API_KEY }}
          MIMO_BASE_URL: "https://api.xiaomimimo.com/v1"
          MIMO_MODEL: "mimo-v2.5"
          TARGET_DATE: ${{ github.event.inputs.target_date }}
      - name: Commit
        run: |
          git config user.name "bot"
          git config user.email "bot@users.noreply.github.com"
          git add articles/
          git diff --cached --quiet || (git commit -m "briefing $(date -u +%Y-%m-%d)" && git push)

  push:
    if: |
      github.event.schedule == '0 0 * * *' || 
      github.event.inputs.phase == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Push to WeChat
        run: python push_briefing.py
        env:
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
