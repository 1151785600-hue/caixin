name: 财新网文章抓取

on:
  schedule:
    # UTC时间，每3小时，北京时间对应为8/11/14/17/20/23点
    # 23点是当天最后一轮抓取，之后进入AI生成阶段
    - cron: '0 0 * * *'   # 北京8:00
    - cron: '0 3 * * *'   # 北京11:00
    - cron: '0 6 * * *'   # 北京14:00
    - cron: '0 9 * * *'   # 北京17:00
    - cron: '0 12 * * *'  # 北京20:00
    - cron: '0 15 * * *'  # 北京23:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run scraper
        run: python caixin_monitor.py
        env:
          OUTPUT_DIR: articles

      - name: Commit and push
        run: |
          git config user.name "caixin-monitor-bot"
          git config user.email "caixin-monitor-bot[bot]@users.noreply.github.com"
          git add articles/
          if git diff --cached --quiet; then
            echo "没有新文章"
          else
            git diff --cached --name-only
            git commit -m "docs: 财新新文章 $(date -u +%Y-%m-%d_%H:%M_UTC)"
            git push
          fi
