name: 每日简报

on:
  schedule:
    # 北京0:30 = UTC 16:30（前一天），AI筛选+摘要+评论
    - cron: '30 16 * * *'
    # 北京8:00 = UTC 0:00，纯推送（秒级完成）
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      phase:
        description: '运行阶段: generate 或 push'
        required: false
        default: 'generate'

permissions:
  contents: write

jobs:
  generate:
    # 只在0:30或手动指定generate时运行
    if: |
      github.event.schedule == '30 16 * * *' || 
      (github.event_name == 'workflow_dispatch' && github.event.inputs.phase == 'generate') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.phase == '')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Generate briefing (AI summary + commentary)
        run: python generate_briefing.py
        env:
          MIMO_API_KEY: ${{ secrets.MIMO_API_KEY }}
          MIMO_BASE_URL: "https://api.xiaomimimo.com/v1"
          MIMO_MODEL: "mimo-v2.5"

      - name: Commit briefing
        run: |
          git config user.name "caixin-monitor-bot"
          git config user.email "caixin-monitor-bot[bot]@users.noreply.github.com"
          git add articles/
          if git diff --cached --quiet; then
            echo "无简报更新"
          else
            git commit -m "docs: AI简报生成 $(date -u +%Y-%m-%d)"
            git push
          fi

  push:
    # 只在8:00或手动指定push时运行
    if: |
      github.event.schedule == '0 0 * * *' || 
      github.event.inputs.phase == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Push briefing to WeChat via ServerChan
        run: python push_briefing.py
        env:
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
